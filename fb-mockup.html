<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoTeach Mockup 566x1080</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 566px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .glow-blue {
            box-shadow: 0 0 60px -10px rgba(59, 130, 246, 0.4);
        }

        .bg-blob {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.4;
        }
    </style>
</head>

<body class="py-16 px-8">
    <!-- Background Decor -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="bg-blob top-[-5%] left-[-10%] w-[450px] h-[450px] bg-blue-600/20"></div>
        <div class="bg-blob bottom-[5%] right-[-10%] w-[450px] h-[450px] bg-purple-600/20"></div>
        <div class="bg-blob top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-600/10"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 w-full flex flex-col items-center gap-12">
        <!-- Badge -->
        <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full glass border border-white/10 text-blue-400 text-sm font-bold tracking-widest uppercase">
            <span class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></span>
            Przyszłość edukacji
        </div>

        <!-- Headline -->
        <div class="space-y-6 text-center">
            <h1 class="text-[64px] font-extrabold text-white leading-[1] tracking-tighter">
                Ucz <span class="gradient-text">mądrzej</span>,<br>nie trudniej.
            </h1>
            <p class="text-xl text-gray-400 leading-relaxed max-w-[440px] mx-auto">
                Odzyskaj 5 godzin tygodniowo dzięki AI. Generuj plany lekcji i sprawdziany w sekundy.
            </p>
        </div>

        <!-- Dashboard Preview -->
        <div class="relative w-full max-w-[480px] mx-auto pt-4">
            <div class="animate-float">
                <div class="glass p-8 rounded-[40px] border border-white/20 shadow-2xl relative overflow-hidden">
                    <!-- Fake App Header -->
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex gap-2">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
                        </div>
                        <div class="text-[10px] text-white/30 font-mono tracking-widest uppercase">DASHBOARD</div>
                    </div>

                    <!-- Fake App Content -->
                    <div class="space-y-8">
                        <div class="h-10 w-2/3 bg-white/10 rounded-xl"></div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="h-24 bg-blue-500/20 rounded-2xl border border-blue-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-blue-500 rounded-lg"></div>
                                <div class="h-2 w-10 bg-white/20 rounded"></div>
                            </div>
                            <div class="h-24 bg-purple-500/20 rounded-2xl border border-purple-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-purple-500 rounded-lg"></div>
                                <div class="h-2 w-10 bg-white/20 rounded"></div>
                            </div>
                            <div class="h-24 bg-emerald-500/20 rounded-2xl border border-emerald-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-emerald-500 rounded-lg"></div>
                                <div class="h-2 w-10 bg-white/20 rounded"></div>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div class="h-4 w-full bg-white/5 rounded"></div>
                            <div class="h-4 w-5/6 bg-white/5 rounded"></div>
                        </div>
                    </div>

                    <!-- AI Highlight -->
                    <div class="absolute right-4 top-1/4 glass p-5 rounded-3xl border border-blue-400/50 glow-blue max-w-[180px]">
                        <div class="text-blue-400 font-bold text-[8px] mb-1 uppercase tracking-wider">AI GENERATOR</div>
                        <div class="text-white text-sm font-medium leading-tight">Plan lekcji gotowy! ✨</div>
                    </div>
                </div>
            </div>
            
            <!-- Glow background -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full"></div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-purple-500/20 blur-[80px] rounded-full"></div>
        </div>
    </div>

    <!-- Branding Footer -->
    <div class="relative z-10 w-full">
        <div class="glass py-8 px-8 rounded-[40px] border border-white/10 flex flex-col gap-6 items-center text-center">
            <div class="space-y-1">
                <div class="text-4xl font-black text-white tracking-tighter italic">COTEACH</div>
                <div class="text-white/60 text-sm font-medium tracking-wide">Pierwszy asystent nauczyciela 2.0</div>
            </div>
            
            <div class="w-full h-px bg-white/10"></div>

            <div class="flex items-center justify-between w-full">
                <div class="flex flex-col items-start text-left">
                    <div class="text-blue-400 font-bold text-lg tracking-widest uppercase">Zacznij teraz</div>
                    <div class="text-white/40 text-sm font-mono">www.coteach.pl</div>
                </div>
                <div class="h-16 w-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-2xl shadow-blue-500/40 transform hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
