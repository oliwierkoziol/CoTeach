<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoTeach FB Cover Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 600px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .glow-blue {
            box-shadow: 0 0 50px -10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="relative flex items-center justify-center">
    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[600px] h-[600px] bg-purple-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-600/10 blur-[150px] rounded-full"></div>
    </div>

    <div class="relative z-10 w-full max-w-7xl px-12 grid grid-cols-2 gap-16 items-center">
        <!-- Text Side -->
        <div class="space-y-8">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass border border-white/10 text-blue-400 text-sm font-bold tracking-wide uppercase">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                Przyszłość edukacji jest tutaj
            </div>
            <h1 class="text-7xl font-extrabold text-white leading-tight tracking-tighter">
                Ucz <span class="gradient-text">mądrzej</span>,<br>nie trudniej.
            </h1>
            <p class="text-2xl text-gray-400 leading-relaxed max-w-xl">
                Odzyskaj 5 godzin tygodniowo dzięki AI. Generuj plany lekcji, sprawdziany i prezentacje w sekundy.
            </p>
        </div>

        <!-- Dashboard Preview Side -->
        <div class="relative">
            <div class="animate-float">
                <div class="glass p-6 rounded-[32px] border border-white/20 shadow-2xl relative overflow-hidden">
                    <!-- Fake App Header -->
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                        </div>
                        <div class="text-xs text-white/30 font-mono tracking-widest uppercase">COTEACH / DASHBOARD</div>
                    </div>

                    <!-- Fake App Content -->
                    <div class="space-y-6">
                        <div class="h-12 w-2/3 bg-white/10 rounded-lg"></div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="h-32 bg-blue-500/20 rounded-2xl border border-blue-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-blue-500 rounded-lg"></div>
                                <div class="h-2 w-12 bg-white/20 rounded"></div>
                            </div>
                            <div class="h-32 bg-purple-500/20 rounded-2xl border border-purple-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-purple-500 rounded-lg"></div>
                                <div class="h-2 w-12 bg-white/20 rounded"></div>
                            </div>
                            <div class="h-32 bg-emerald-500/20 rounded-2xl border border-emerald-500/30 flex flex-col items-center justify-center gap-2">
                                <div class="w-8 h-8 bg-emerald-500 rounded-lg"></div>
                                <div class="h-2 w-12 bg-white/20 rounded"></div>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div class="h-4 w-full bg-white/5 rounded"></div>
                            <div class="h-4 w-5/6 bg-white/5 rounded"></div>
                            <div class="h-4 w-4/6 bg-white/5 rounded"></div>
                        </div>
                    </div>

                    <!-- AI Highlight -->
                    <div class="absolute -right-4 top-1/4 glass p-4 rounded-2xl border border-blue-400/50 glow-blue max-w-[200px]">
                        <div class="text-blue-400 font-bold text-xs mb-1">AI GENERATOR</div>
                        <div class="text-white text-sm font-medium">Plan lekcji: Biologia komórki wygenerowany! ✨</div>
                    </div>
                </div>
            </div>

            <!-- Floating elements -->
            <div class="absolute -top-12 -left-12 w-24 h-24 bg-blue-500/30 blur-2xl rounded-full"></div>
            <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-purple-500/30 blur-3xl rounded-full"></div>
        </div>
    </div>

    <!-- Branding footer -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 opacity-50">
        <div class="text-2xl font-black text-white tracking-tighter italic">COTEACH</div>
        <div class="w-px h-6 bg-white/20"></div>
        <div class="text-white/60 font-medium">Pierwszy asystent nauczyciela 2.0</div>
    </div>
</body>
</html>
